services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent123
      POSTGRES_DB: competitor
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports: ["8080:8080"]
    depends_on: [postgres, redis]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://agent:agent123@postgres:5432/competitor
      REDIS_URL: redis://redis:6379

volumes:
  pgdata:
