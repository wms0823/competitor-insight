<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>竞品深度对比分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #38bdf8; --accent2: #818cf8; --green: #34d399; --red: #f87171; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { width: 100%; max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
        h1 { font-size: 1.7rem; text-align: center; margin-bottom: .4rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { text-align: center; color: var(--muted); margin-bottom: 1.8rem; font-size: .9rem; }
        .badges { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.8rem; }
        .badge { font-size: .72rem; padding: .22rem .6rem; border-radius: 20px; background: var(--card); border: 1px solid var(--border); color: var(--muted); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem; margin-bottom: 1.2rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
        label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: .3rem; font-weight: 500; }
        input { width: 100%; padding: .7rem .9rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: .95rem; transition: border-color .2s; }
        input:focus { outline: none; border-color: var(--accent); }
        button { width: 100%; padding: .8rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; color: #0f172a; font-size: .95rem; font-weight: 600; cursor: pointer; transition: opacity .2s; }
        button:hover { opacity: .85; }
        button:disabled { opacity: .4; cursor: not-allowed; }
        .error { display: none; background: #7f1d1d; border: 1px solid #dc2626; color: #fca5a5; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .error.show { display: block; }
        .spinner { display: none; text-align: center; padding: 1.5rem; color: var(--muted); }
        .spinner.show { display: block; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .spinner .dot { animation: pulse 1.4s infinite; }
        .spinner .dot:nth-child(2) { animation-delay: .2s; }
        .spinner .dot:nth-child(3) { animation-delay: .4s; }

        /* ── 报告渲染样式 ── */
        .report-wrap { display: none; }
        .report-wrap.show { display: block; }
        .report-body { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2rem 2.2rem; line-height: 1.75; font-size: .9rem; }
        .report-body h2 { font-size: 1.2rem; margin: 1.6em 0 .6em; padding-bottom: .4em; border-bottom: 1px solid var(--border); color: var(--accent); }
        .report-body h2:first-child { margin-top: 0; }
        .report-body h3 { font-size: 1rem; margin: 1.2em 0 .4em; color: var(--text); }
        .report-body p { margin: .6em 0; }
        .report-body ul, .report-body ol { margin: .4em 0; padding-left: 1.5em; }
        .report-body li { margin: .25em 0; }
        .report-body table { width: 100%; border-collapse: collapse; margin: .8em 0 1.2em; font-size: .85rem; }
        .report-body th, .report-body td { border: 1px solid var(--border); padding: .5rem .7rem; text-align: left; vertical-align: top; }
        .report-body th { background: rgba(56,189,248,.08); font-weight: 600; color: var(--accent); white-space: nowrap; }
        .report-body tr:nth-child(even) td { background: rgba(255,255,255,.02); }
        .report-body strong { color: #fff; }
        .report-body hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }
        .report-body code { background: rgba(255,255,255,.06); padding: .15em .4em; border-radius: 4px; font-size: .88em; }
    </style>
</head>
<body>
<div class="container">
    <h1>竞品深度对比分析系统</h1>
    <p class="subtitle">LangGraph 多智能体架构 · 四维并行分析 · 冲突检测 · 决策建议</p>
    <div class="badges">
        <span class="badge">功能对比</span><span class="badge">价格对比</span><span class="badge">口碑对比</span><span class="badge">场景对比</span><span class="badge">冲突检测</span>
    </div>

    <div class="card">
        <div class="form-row">
            <div><label for="a">产品 A</label><input id="a" placeholder="例如：Notion" value="Notion"></div>
            <div><label for="b">产品 B</label><input id="b" placeholder="例如：飞书文档" value="飞书文档"></div>
        </div>
        <div style="margin-bottom:1.4rem;"><label for="c">品类（可选）</label><input id="c" placeholder="例如：文档协作工具" value="文档协作工具"></div>
        <button id="btn" onclick="run()">开始对比分析</button>
    </div>

    <div id="err" class="error"></div>
    <div id="spin" class="spinner">
        四个专业 Agent 并行分析中<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
        <br><small style="color:var(--muted)">功能 · 价格 · 口碑 · 场景 → 交叉验证 → 生成报告</small>
    </div>
    <div id="wrap" class="report-wrap">
        <div id="report" class="report-body"></div>
    </div>
</div>

<script>
marked.setOptions({ breaks: false, gfm: true });

async function run() {
    var btn = document.getElementById('btn');
    var errEl = document.getElementById('err');
    var spin = document.getElementById('spin');
    var wrap = document.getElementById('wrap');
    var rep = document.getElementById('report');

    errEl.classList.remove('show'); errEl.textContent = '';
    wrap.classList.remove('show'); rep.innerHTML = '';

    var a = document.getElementById('a').value.trim();
    var b = document.getElementById('b').value.trim();
    var c = document.getElementById('c').value.trim() || '通用';

    if (!a || !b) { errEl.textContent = '请填写两个产品名称'; errEl.classList.add('show'); return; }

    btn.disabled = true; btn.textContent = '分析中...'; spin.classList.add('show');

    try {
        var resp = await fetch('/compare', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_a: a, product_b: b, category: c })
        });
        var data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'HTTP ' + resp.status);
        spin.classList.remove('show');
        rep.innerHTML = marked.parse(data.report || '分析完成，但未生成报告内容。');
        wrap.classList.add('show');
    } catch (e) {
        spin.classList.remove('show');
        errEl.textContent = '请求失败: ' + e.message;
        errEl.classList.add('show');
    } finally {
        btn.disabled = false;
        btn.textContent = '开始对比分析';
    }
}
</script>
</body>
</html>
